<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===================== PRIMARY SEO ===================== -->
    <title>Home Hero – Trusted Home Services Near You</title>
    <meta name="description" content="Home Hero connects homeowners with trusted local professionals for plumbing, electrical, cleaning, landscaping, and more. Book reliable home services in minutes." />
    <meta name="keywords" content="home services, home repair, plumbing, electrical, cleaning, landscaping, handyman, local professionals, home maintenance" />
    <meta name="author" content="Home Hero" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.homehero.com/" />

    <!-- ===================== OPEN GRAPH (Facebook, LinkedIn) ===================== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Home Hero" />
    <meta property="og:title" content="Home Hero – Trusted Home Services Near You" />
    <meta property="og:description" content="Book trusted local professionals for plumbing, electrical, cleaning, landscaping, and more. Fast, reliable home services at your fingertips." />
    <meta property="og:url" content="https://www.homehero.com/" />
    <meta property="og:image" content="https://www.homehero.com/assets/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Home Hero – Trusted Home Services" />
    <meta property="og:locale" content="en_US" />

    <!-- ===================== TWITTER / X CARD ===================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@homehero" />
    <meta name="twitter:creator" content="@homehero" />
    <meta name="twitter:title" content="Home Hero – Trusted Home Services Near You" />
    <meta name="twitter:description" content="Book trusted local professionals for plumbing, electrical, cleaning, landscaping, and more." />
    <meta name="twitter:image" content="https://www.homehero.com/assets/og-image.jpg" />
    <meta name="twitter:image:alt" content="Home Hero – Trusted Home Services" />

    <!-- ===================== FAVICONS ===================== -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#01696f" />
    <meta name="msapplication-TileColor" content="#01696f" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ===================== GEO / LOCAL SEO ===================== -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />

    <!-- ===================== STRUCTURED DATA (JSON-LD) ===================== -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "HomeAndConstructionBusiness",
            "name": "Home Hero",
            "url": "https://www.homehero.com",
            "logo": "https://www.homehero.com/assets/logo.png",
            "image": "https://www.homehero.com/assets/og-image.jpg",
            "description": "Home Hero connects homeowners with trusted local professionals for plumbing, electrical, cleaning, landscaping, and more.",
            "telephone": "+1-800-HOME-HERO",
            "email": "support@homehero.com",
            "address": {
                "@type": "PostalAddress",
                "addressCountry": "US"
            },
            "sameAs": [
                "https://www.facebook.com/homehero",
                "https://www.twitter.com/homehero",
                "https://www.instagram.com/homehero",
                "https://www.linkedin.com/company/homehero"
            ],
            "hasOfferCatalog": {
                "@type": "OfferCatalog",
                "name": "Home Services",
                "itemListElement": [
                    { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Plumbing" } },
                    { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Electrical" } },
                    { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "House Cleaning" } },
                    { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Landscaping" } },
                    { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Handyman Services" } }
                ]
            },
            "aggregateRating": {
                "@type": "AggregateRating",
                "ratingValue": "4.8",
                "reviewCount": "12500",
                "bestRating": "5",
                "worstRating": "1"
            }
        }
    </script>

    <!-- Mobile Web App (PWA-ready) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Home Hero" />
    <meta name="application-name" content="Home Hero" />

    <!-- ===================== PERFORMANCE HINTS ===================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//api.homehero.com" />
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
